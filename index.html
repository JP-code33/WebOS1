<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhenil's OS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <div id="top-bar">
        <p class="left-text">JPOS</p>
        <p class="right-text">7/20/2026, 7:55:00 PM</p>
    </div>

    <div id="desktop">

        <div id="window-welcome" class="window-card">

            <div class="window-header">
                <div class="traffic-lights">
                    <span class="dot red" onclick="toggleWin('window-welcome')"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <div class="window-title">System Status</div>
            </div>
            
            <h1>Welcome to my OS</h1>

            <h2>
                My name is Jhenil. I am here to learn new things about coding. I love to make projects and currently working on Jarvis. I also love Formula 1!
            </h2>

            <img src="./RB22 Wallpaper.jpg" />

            <p class="greeting">Hello Everyone!</p>

            <div class="link-buttons">
                <a href="https://www.youtube.com/@JPCRICEDITZZ" class="button">YouTube</a>
                <a href="https://formula1.com" class="button">Fomula 1</a>

            </div>
        </div>
    </div>

    <div id="taskbar"
        <button class="task-btn" onclick="toggleWin('window-welcome')">🤖 Open Welcome Card</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
